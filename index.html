<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TubeScout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d0d; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.5; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #222; }
        .logo { font-size: 28px; font-weight: bold; color: #ff2d55; letter-spacing: -0.5px; }
        button, input[type="submit"] { cursor: pointer; font-weight: 600; transition: background 0.2s ease, transform 0.1s ease; }
        button:active, input[type="submit"]:active { transform: scale(0.98); }
        .waitlist-btn, .extract, .waitlist-form input[type="submit"] { background: #ff2d55; color: white; border: none; }
        .waitlist-btn:hover, .extract:hover, .waitlist-form input[type="submit"]:hover { background: #e02447; }
        .waitlist-btn { padding: 10px 20px; border-radius: 30px; font-size: 14px; text-decoration: none; }
        main { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 42px; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        .hero p { color: #888; font-size: 16px; }
        .card { background: #141414; border: 1px solid #222; border-radius: 16px; padding: 30px; margin-bottom: 40px; }
        .card h2 { font-size: 20px; margin-bottom: 8px; }
        .card p { color: #888; font-size: 14px; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; background: #000; border: 1px solid #222; border-radius: 8px; color: white; padding: 15px; font-family: monospace; font-size: 14px; resize: none; margin-bottom: 15px; outline: none; }
        textarea:focus { border-color: #444; }
        .extract { width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; }
        .actions { display: flex; gap: 15px; margin-bottom: 20px; }
        .actions button { flex: 1; padding: 12px; background: #222; color: white; border: none; border-radius: 8px; font-size: 14px; }
        .actions button.active { background: #ff2d55; }
        .status { font-size: 14px; color: #888; margin-bottom: 15px; }
        .waitlist { text-align: center; max-width: 500px; margin: 0 auto; }
        .waitlist-form { display: flex; gap: 10px; margin-top: 15px; }
        .waitlist input[type="email"] { flex: 1; background: #141414; border: 1px solid #222; border-radius: 8px; color: white; padding: 12px 15px; font-size: 14px; outline: none; }
        .waitlist input[type="email"]:focus { border-color: #444; }
        .waitlist-form input[type="submit"] { padding: 0 25px; border-radius: 8px; font-size: 14px; }
        footer { text-align: center; padding: 40px 0; border-top: 1px solid #111; color: #444; font-size: 14px; margin-top: 100px; }
        footer a { color: #666; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: #ff2d55; }
    </style>
</head>
<body>

    <header>
        <div class="logo">TubeScout</div>
        <a href="#waitlist-section" class="waitlist-btn">Join Waitlist</a>
    </header>

    <main>
        <div class="hero">
            <h1>Export YouTube URLs Instantly</h1>
            <p>Paste Videos, Shorts or Playlists URL</p>
        </div>

        <div class="card">
            <div class="actions">
                <button class="active">Videos</button>
                <button>Shorts</button>
                <button>Playlists</button>
            </div>
            <textarea id="urlInput" placeholder="Videos:&#10;https://youtube.com/@betterstack/videos&#10;&#10;Shorts:&#10;https://youtube.com/@betterstack/shorts"></textarea>
            <div class="status" id="backendStatus">Ready to extract</div>
            <button class="extract" onclick="extractUrls()">Extract URLs</button>
        </div>

        <div class="card waitlist" id="waitlist-section">
            <h2>Get Early Access To TubeScout Pro</h2>
            <p>Be the first to know when we launch advanced filtering features.</p>
            <form class="waitlist-form" action="https://script.google.com/macros/s/AKfycbyyvavvPy9fcR9Cx1PgrFaUT_tEUm_o03B1C9SP3QCNCiRMK-0UspwRSgHIMHWH-Axe/exec" method="GET">
                <input type="email" name="email" placeholder="Enter your email address" required>
                <input type="submit" value="Join Waitlist">
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 TubeScout. All Rights Reserved.</p>
        <p style="margin-top:5px;"><a href="mailto:tubescoutsupport.voltage064@passinbox.com">tubescoutsupport.voltage064@passinbox.com</a></p>
    </footer>

    <script>
        async function extractUrls() {
            const urlInput = document.getElementById("urlInput").value.trim();
            const status = document.getElementById("backendStatus");
            const result = document.getElementById("urlInput");
            if (!urlInput) { status.innerHTML = "Please paste a URL first."; return; }
            status.innerHTML = "Extracting URLs...";
            try {
                const response = await fetch("http://localhost:5000/extract", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await response.json();
                if (data.error) { status.innerHTML = "Error: " + data.error; return; }
                status.innerHTML = "Found " + (data.count || 0) + " URLs";
                result.value = data.urls ? data.urls.join("\n") : "";
            } catch (error) {
                console.error(error);
                status.innerHTML = "Backend error connection failed.";
            }
        }
    </script>
</body>
</html>
