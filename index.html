<!DOCTYPE html>
<html>
<head>
<title>TubeScout</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:50px;
}

.box{
    background:#222;
    padding:30px;
    border-radius:15px;
    max-width:600px;
    margin:auto;
}

input{
    width:80%;
    padding:12px;
    margin:10px;
}

button{
    padding:12px 25px;
    cursor:pointer;
}

#result{
    white-space:pre-wrap;
    margin-top:20px;
}
</style>

</head>

<body>

<div class="box">

<h1>TubeScout</h1>

<input id="url" placeholder="Paste YouTube playlist URL">

<br>

<button onclick="extract()">Extract Links</button>

<div id="status"></div>

<pre id="result"></pre>

</div>


<script>

async function extract(){

let url=document.getElementById("url").value;

let status=document.getElementById("status");

status.innerHTML="Loading...";


try{

let res=await fetch("/extract",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
url:url
})
});


let data=await res.json();


if(data.error){

status.innerHTML=data.error;

return;

}


status.innerHTML="Found "+data.count+" links";

document.getElementById("result").innerHTML =
data.urls.join("\n");


}

catch(e){

status.innerHTML="Backend error";

}


}

</script>


</body>
</html>
