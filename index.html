<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeScout - YouTube Channel URL Extractor & Research Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .bg-primary { background-color: #FF0033; }
        .text-primary { color: #FF0033; }
        .border-primary { border-color: #FF0033; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased">

    <nav class="sticky top-0 bg-white/90 backdrop-blur-sm border-b border-gray-100 py-6 px-8 flex justify-between items-center z-50">
        <div class="text-xl font-extrabold tracking-tighter">● TubeScout</div>
        <div class="hidden md:flex space-x-8 text-sm font-medium text-gray-600">
            <a href="#features" class="hover:text-black">Features</a>
            <a href="#use-cases" class="hover:text-black">Use Cases</a>
            <a href="mailto:tubescoutsupport.voltage064@passinbox.com" class="hover:text-black">Contact</a>
        </div>
        <button class="bg-black text-white px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-gray-800 transition">Join Waitlist</button>
    </nav>

    <main class="max-w-4xl mx-auto py-24 px-6 text-center">
        <div class="inline-block px-4 py-1.5 mb-6 text-xs font-bold uppercase tracking-widest bg-gray-100 rounded-full text-gray-600">⚡ Built for Content Researchers & AI Workflows</div>
        <h1 class="text-6xl font-extrabold mb-8 tracking-tighter leading-[1.1]">Export Every Video URL From Any YouTube Channel In Seconds</h1>
        <p class="text-xl text-gray-600 mb-12 max-w-2xl mx-auto">Stop scrolling through competitor channels. Instantly collect Videos, Shorts, Live Streams, and Podcasts for research, content audits, and AI workflows.</p>

        <div class="bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-inner text-left">
            <div class="flex flex-col md:flex-row gap-3">
                <input id="channelUrl" type="text" placeholder="https://youtube.com/@ChannelName" class="flex-grow p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                <button onclick="extractUrls()" id="extractBtn" class="bg-primary text-white px-8 py-4 rounded-xl font-bold hover:opacity-90 transition shadow-lg">Extract URLs</button>
            </div>
            
            <div id="resultBox" class="mt-8 space-y-4">
                <p id="status" class="text-sm font-bold text-gray-800"></p>
                <textarea id="output" class="w-full h-64 p-4 text-xs font-mono bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500" placeholder="Extracted URLs will appear here..." readonly></textarea>
                <button onclick="copyResults()" class="text-sm font-bold text-primary underline">Copy All URLs</button>
            </div>
        </div>
    </main>

    <script>
        async function extractUrls() {
            const urlInput = document.getElementById('channelUrl').value;
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            const btn = document.getElementById('extractBtn');

            if (!urlInput) return alert("Please enter a YouTube channel URL");

            btn.disabled = true;
            btn.innerText = "Extracting...";
            status.innerText = "Scanning channel...";

            try {
                const response = await fetch('https://tubescout-backend.onrender.com/extract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await response.json();
                status.innerText = `✓ ${data.urls.length} URLs Found`;
                output.value = data.urls.join('\n');
            } catch (err) {
                status.innerText = "❌ Error: Could not reach backend. Check Render logs.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Extract URLs";
            }
        }
        function copyResults() {
            const output = document.getElementById('output');
            output.select();
            document.execCommand('copy');
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
