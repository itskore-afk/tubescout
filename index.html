<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeScout - Export YouTube Channels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900 selection:bg-rose-500 selection:text-white">

    <header class="max-w-4xl mx-auto text-center pt-20 px-4">
        <h1 class="text-5xl font-bold tracking-tight text-gray-900 md:text-6xl lg:text-7xl mb-6">
            Export Any YouTube Channel in <br class="hidden md:block"> Seconds
        </h1>
        <p class="text-xl text-gray-500 max-w-2xl mx-auto mb-10">
            Get Videos, Shorts, Live Streams and Podcast URLs instantly. Perfect for AI research, competitor analysis, NotebookLM and content audits.
        </p>
        
        <div class="flex justify-center gap-4 mb-16">
            <button class="bg-[#FF003F] hover:bg-[#D60035] text-white font-semibold px-8 py-4 rounded-2xl shadow-lg shadow-rose-500/20 transition-all duration-200 transform hover:-translate-y-0.5">
                Try Free
            </button>
            <button class="bg-white border border-gray-200 hover:border-gray-300 text-gray-700 font-semibold px-8 py-4 rounded-2xl transition-all duration-200 transform hover:-translate-y-0.5">
                Join Waitlist
            </button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 pb-24">
        <div class="bg-white rounded-3xl border border-gray-100 p-8 shadow-xl shadow-gray-200/50">
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1">
                    <input 
                        type="url" 
                        id="youtubeUrl"
                        placeholder="https://www.youtube.com/@TheDiaryOfACEO" 
                        class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-[#FF003F] focus:ring-2 focus:ring-rose-500/10 transition-all text-base"
                    >
                </div>
                <button 
                    onclick="extractData()"
                    id="submitBtn"
                    class="bg-[#FF003F] hover:bg-[#D60035] text-white font-semibold px-8 py-4 rounded-2xl transition-all duration-200 flex items-center justify-center gap-2 whitespace-nowrap"
                >
                    <span>Extract URLs</span>
                </button>
                <button 
                    onclick="resetForm()"
                    class="bg-gray-50 hover:bg-gray-100 border border-gray-200 p-4 rounded-2xl transition-all duration-200 flex items-center justify-center text-gray-500"
                    title="Reset template"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.253 8H18" />
                    </svg>
                </button>
            </div>

            <div id="statusBox" class="mt-6 hidden">
                <div id="statusMessage" class="flex items-start gap-3 p-4 rounded-2xl text-sm font-medium">
                    </div>
            </div>

            <div id="outputSection" class="mt-8 pt-8 border-t border-gray-100 hidden">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-gray-900" id="channelNameDisplay">Channel Meta Logs</h3>
                    <span id="videoCountBadge" class="bg-rose-50 text-[#FF003F] text-xs font-semibold px-3 py-1 rounded-full">0 Entries Found</span>
                </div>
                <div class="bg-gray-900 rounded-2xl p-5 font-mono text-xs text-green-400 overflow-x-auto max-h-96 shadow-inner">
                    <pre id="jsonResponseDisplay">Awaiting remote pipeline execution parameters...</pre>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function extractData() {
            const urlInput = document.getElementById('youtubeUrl').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            const statusMessage = document.getElementById('statusMessage');
            const outputSection = document.getElementById('outputSection');
            const jsonDisplay = document.getElementById('jsonResponseDisplay');
            const channelTitle = document.getElementById('channelNameDisplay');
            const countBadge = document.getElementById('videoCountBadge');

            if (!urlInput) {
                showStatus('⚠️ Please enter a valid YouTube channel or handle URL first.', 'warning');
                return;
            }

            // Enter active processing layout state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Extracting...</span>
            `;
            showStatus('🚀 Handshaking with secure cloud cluster... (Free instances may take up to 50s to wake up)', 'info');
            outputSection.classList.add('hidden');

            try {
                // Connected directly to your live production Render service instance
                const response = await fetch('https://tubescout-backend.onrender.com/extract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.get_json ? await response.get_json() : await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `Server responded with status code: ${response.status}`);
                }

                // Render execution payload success UI layouts
                showStatus('✅ Extraction processing cycle completed successfully!', 'success');
                channelTitle.textContent = data.channel_title || 'Extracted Workspace';
                countBadge.textContent = `${data.total_videos || 0} Links Isolated`;
                jsonDisplay.textContent = JSON.stringify(data, null, 4);
                outputSection.classList.remove('hidden');

            } catch (error) {
                console.error('System Data Transfer Fault:', error);
                showStatus(`❌ Cloud pipeline connection issue. Ensure your Render backend dashboard status is set to active and running.`, 'error');
            } finally {
                // Revert control switch indicators back to default tracking layouts
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Extract URLs</span>';
            }
        }

        function showStatus(text, type) {
            const statusBox = document.getElementById('statusBox');
            const statusMessage = document.getElementById('statusMessage');
            
            statusBox.classList.remove('hidden');
            statusMessage.className = "flex items-start gap-3 p-4 rounded-2xl text-sm font-medium ";

            if (type === 'error') {
                statusMessage.className += "bg-red-50 text-red-700 border border-red-100";
            } else if (type === 'warning') {
                statusMessage.className += "bg-amber-50 text-amber-700 border border-amber-100";
            } else if (type === 'info') {
                statusMessage.className += "bg-blue-50 text-blue-700 border border-blue-100";
            } else {
                statusMessage.className += "bg-emerald-50 text-emerald-700 border border-emerald-100";
            }
            
            statusMessage.innerHTML = `<span>${text}</span>`;
        }

        function resetForm() {
            document.getElementById('youtubeUrl').value = '';
            document.getElementById('statusBox').classList.add('hidden');
            document.getElementById('outputSection').classList.add('hidden');
        }
    </script>
</body>
</html>
