<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TubeScout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FFFFFF; color: #000000; }
        .btn-red { background-color: #FF0033; color: white; }
    </style>
</head>
<body class="p-6">
    <main class="max-w-2xl mx-auto border border-gray-200 rounded-3xl p-8 shadow-sm">
        <input id="url" type="text" placeholder="Paste YouTube Channel URL" class="w-full p-4 border rounded-xl mb-4">
        <button id="btn" onclick="run()" class="w-full btn-red p-4 rounded-xl font-bold">Extract URLs</button>
        <textarea id="res" class="w-full mt-6 h-64 p-4 border rounded-xl" placeholder="Results..." readonly></textarea>
    </main>
    <script>
        async function run() {
            const btn = document.getElementById('btn');
            const res = document.getElementById('res');
            const url = document.getElementById('url').value;
            btn.innerText = "Extracting...";
            try {
                const response = await fetch('https://tubescout-backend.onrender.com/extract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();
                if(data.urls) res.value = data.urls.join('\n');
                else res.value = "Error: " + data.error;
            } catch (e) { res.value = "Connection failed."; }
            btn.innerText = "Extract URLs";
        }
    </script>
</body>
</html>
