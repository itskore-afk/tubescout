<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeScout - YouTube Channel URL Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <main class="max-w-3xl mx-auto py-20 px-6 text-center">
        <h1 class="text-5xl font-extrabold mb-6">Export Any YouTube Channel in Seconds</h1>
        
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
            <div class="flex gap-2">
                <input id="channelUrl" type="text" placeholder="https://www.youtube.com/@ChannelName" class="flex-grow p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                <button onclick="extractUrls()" id="extractBtn" class="bg-red-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-700 transition">Extract URLs</button>
            </div>
            <p id="status" class="mt-4 text-sm text-gray-500 italic"></p>
        </div>
    </main>

    <footer class="text-center py-10 text-gray-600">
        <p>Need help? Contact support at: 
           <a href="mailto:tubescoutsupport.voltage064@passinbox.com" class="text-red-600 underline">tubescoutsupport.voltage064@passinbox.com</a>
        </p>
    </footer>

    <script>
        async function extractUrls() {
            const url = document.getElementById('channelUrl').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('extractBtn');

            if (!url) return alert("Please enter a YouTube channel URL");

            status.innerText = "🚀 Connecting to cloud server...";
            btn.disabled = true;

            try {
                // Pointing to your live Render backend
                const response = await fetch('https://tubescout-backend.onrender.com/extract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url })
                });

                if (!response.ok) throw new Error('Server connection failed');

                const data = await response.json();
                status.innerText = "✅ Success! URLs extracted.";
                console.log(data);
                // Add your logic here to display the results
            } catch (err) {
                status.innerText = "❌ Error: Could not connect to backend. Ensure your Render service is live.";
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
