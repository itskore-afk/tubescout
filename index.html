<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TubeScout - YouTube Channel URL Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FFFFFF; color: #000000; font-family: sans-serif; }
        .btn-red { background-color: #FF0033; color: white; }
    </style>
</head>
<body>
    <nav class="p-6 flex justify-between border-b border-gray-100">
        <div class="font-bold text-xl">● TubeScout</div>
        <div class="space-x-6 text-sm"><a href="#features">Features</a><a href="mailto:tubescoutsupport.voltage064@passinbox.com">Contact</a></div>
    </nav>
    <main class="max-w-3xl mx-auto py-20 px-6 text-center">
        <h1 class="text-5xl font-extrabold mb-6">Export Every Video URL From Any YouTube Channel In Seconds</h1>
        <div class="bg-gray-50 p-8 rounded-2xl border border-gray-200">
            <div class="flex gap-2">
                <input id="url" type="text" placeholder="Paste YouTube URL" class="flex-grow p-4 border rounded-xl">
                <button onclick="run()" id="btn" class="btn-red px-8 py-4 rounded-xl font-bold">Extract URLs</button>
            </div>
            <textarea id="res" class="w-full mt-6 h-40 p-4 border rounded-xl" readonly placeholder="Results appear here..."></textarea>
        </div>
    </main>
    <script>
        async function run() {
            const btn = document.getElementById('btn');
            const res = document.getElementById('res');
            btn.innerText = "Extracting...";
            try {
                const r = await fetch('https://tubescout-backend.onrender.com/extract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: document.getElementById('url').value })
                });
                const d = await r.json();
                res.value = d.urls.join('\n');
            } catch (e) { res.value = "Error: Backend unreachable. Check Render logs."; }
            btn.innerText = "Extract URLs";
        }
    </script>
</body>
</html>
