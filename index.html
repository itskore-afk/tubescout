<form id="waitlistForm">
  <input type="email" name="email" id="email" placeholder="Enter your email address" required>
  <button type="submit">Join Waitlist</button>
</form>

<script>
  const form = document.getElementById('waitlistForm');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    // Updated with your new Web App URL
    const url = "https://script.google.com/macros/s/AKfycbwy8zMB6kAbv0t_tXZU8RwhBp8x717Ej3U5gUUNnhq9JQUP5kai6as1K1D8oBuNB0JZ/exec";
    
    fetch(url, {
      method: 'POST',
      body: new FormData(form)
    })
    .then(res => res.json())
    .then(data => {
      if(data.result === 'success') {
        alert("Success! Your email has been added.");
        form.reset();
      } else {
        alert("Error: " + (data.error || "Unknown error"));
      }
    })
    .catch(err => {
      console.error(err);
      alert("Submission failed. Check the console for details.");
    });
  });
</script>
