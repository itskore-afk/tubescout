<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TubeScout | Export Every Video URL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FFFFFF; color: #000000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .btn-red { background-color: #FF0033; color: white; }
        .btn-outline { border: 1px solid #000000; color: #000000; }
    </style>
</head>
<body>
    <nav class="max-w-6xl mx-auto py-8 px-6 flex justify-between items-center">
        <div class="font-extrabold text-2xl tracking-tighter">● TubeScout</div>
        <div class="space-x-8 text-sm font-medium">
            <a href="#features" class="hover:text-red-500">Features</a>
            <a href="mailto:tubescoutsupport.voltage064@passinbox.com">Contact</a>
        </div>
        <button class="bg-black text-white px-6 py-2.5 rounded-full text-sm font-semibold">Join Waitlist</button>
    </nav>

    <main class="max-w-3xl mx-auto py-20 px-6 text-center">
        <div class="inline-block px-4 py-1.5 mb-6 text-xs font-bold uppercase tracking-widest bg-gray-100 rounded-full">⚡ Built for Content Researchers</div>
        <h1 class="text-6xl font-extrabold mb-8 tracking-tighter leading-tight">Export Every Video URL From Any YouTube Channel In Seconds</h1>
        
        <div class="bg-white border border-gray-200 rounded-3xl p-8 shadow-sm text-left">
            <div class="flex flex-col gap-3">
                <input id="url" type="text" placeholder="https://youtube.com/@ChannelName" class="w-full p-4 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#FF0033]">
                <button onclick="run()" id="btn" class="btn-red w-full p-4 rounded-xl font-bold text-lg">Extract URLs</button>
            </div>
            <p id="stats" class="mt-4 text-sm font-semibold"></p>
            <textarea id="res" class="w-full mt-4 h-64 p-4 border border-gray-200 rounded-xl font-mono text-sm" readonly placeholder="Results..."></textarea>
        </div>
    </main>
    <script>
        async function run() {
            const btn = document.getElementById('btn');
            const res = document.getElementById('res');
            const stats = document.getElementById('stats');
            btn.innerText = "Extracting...";
            try {
                const r = await fetch('https://tubescout-backend.onrender.com/extract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: document.getElementById('url').value })
                });
                const d = await r.json();
                stats.innerText = `✓ ${d.count} Videos Found`;
                res.value = d.urls.join('\n');
            } catch (e) { res.value = "Error: Backend failed."; }
            btn.innerText = "Extract URLs";
        }
    </script>
</body>
</html>
