<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeScout - YouTube Channel URL Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .btn-red { background-color: #FF0033; transition: opacity 0.2s; }
        .btn-red:hover { opacity: 0.9; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <nav class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-gray-100 py-4 px-6 flex justify-between items-center z-50">
        <div class="font-bold text-xl">● TubeScout</div>
        <div class="space-x-6 text-sm text-gray-600">
            <a href="#features">Features</a>
            <a href="#faq">FAQ</a>
            <a href="mailto:tubescoutsupport.voltage064@passinbox.com">Contact</a>
        </div>
        <button class="text-sm font-semibold border border-gray-200 px-4 py-2 rounded-full hover:bg-gray-50">Join Waitlist</button>
    </nav>

    <main class="max-w-3xl mx-auto py-24 px-6 text-center">
        <span class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4 block">⚡ Built for Content Researchers</span>
        <h1 class="text-6xl font-bold mb-6 tracking-tight">Export Every Video URL From Any YouTube Channel In Seconds</h1>
        <p class="text-xl text-gray-600 mb-10">Stop scrolling through competitor channels. Instantly collect Videos, Shorts, and Live Streams for AI workflows.</p>

        <div class="bg-gray-50 p-8 rounded-2xl border border-gray-200 shadow-sm text-left">
            <div class="flex gap-2">
                <input id="channelUrl" type="text" placeholder="https://youtube.com/@ChannelName" class="flex-grow p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                <button onclick="extractUrls()" id="extractBtn" class="btn-red text-white px-8 py-4 rounded-xl font-bold">Extract URLs</button>
            </div>
            <div id="resultBox" class="mt-6 p-4 bg-white border border-gray-100 rounded-xl hidden">
                <p id="status" class="text-sm text-gray-800 font-medium"></p>
                <textarea id="output" class="w-full h-32 mt-2 p-2 text-xs font-mono border-none focus:ring-0" readonly></textarea>
            </div>
        </div>
    </main>

    <script>
        async function extractUrls() {
            const url = document.getElementById('channelUrl').value;
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            const resultBox = document.getElementById('resultBox');
            const btn = document.getElementById('extractBtn');

            if (!url) return alert("Please enter a URL");
            
            resultBox.classList.remove('hidden');
            status.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch('https://tubescout-backend.onrender.com/extract', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();
                status.innerText = "Success! Found " + data.urls.length + " videos.";
                output.value = data.urls.join('\n');
            } catch (err) {
                status.innerText = "Error: Could not reach backend. Check Render logs.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
